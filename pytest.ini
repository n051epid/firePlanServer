[pytest]
DJANGO_SETTINGS_MODULE = firePlanProject.settings
python_files = test_*.py
python_classes = *Test
python_functions = test_*
addopts = -v --tb=short
testpaths = fire_100UpPlan/tests

# ─── Test Markers ─────────────────────────────────────
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (require DB, Redis)
    e2e: End-to-end API journey tests
    performance: Performance/load tests (run separately)
    slow: Slow-running tests (>10s)

# ─── Coverage ─────────────────────────────────────────
[coverage:run]
source = fire_100UpPlan
omit =
    */migrations/*
    */tests/*
    */__pycache__/*
    */venv/*
    */firePlanProject/settings*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
